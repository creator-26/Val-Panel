<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Val Clan - Protocolo de Seguridad</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <span class="shield-icon" style="font-size: 45px;">🛡️</span>
            <h2>ACCESO RESTRINGIDO</h2>
            <p>Introduce la clave de seguridad</p>
            <input type="password" id="passInput" placeholder="Contraseña...">
            <button id="loginBtn" class="btn-cyan">ENTRAR</button>
        </div>
    </div>

    <header id="topHeader" class="top-header" style="display: none;">
        <div class="logo">
            <span class="shield-icon">🛡️</span>
            <h1>VAL CLAN</h1>
        </div>
        <div class="profile-icon">👤</div>
    </header>

    <main id="mainContent" class="container" style="display: none;">

        <div class="titles">
            <p class="subtitle">ELITE PROTOCOL</p>
            <h2>Gestión de Whitelist</h2>
        </div>

        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Buscar usuario...">
        </div>

        <div class="rank-selector">
            <label for="rankInput">RANGO:</label>
            <select id="rankInput">
                <option value="MEMBER">MEMBER</option>
                <option value="VETERAN">VETERAN</option>
                <option value="ELITE">ELITE</option>
                <option value="SUPREMO" selected>SUPREMO 👑</option>
            </select>
        </div>

        <button id="addUserBtn" class="btn-cyan">
            AÑADIR USUARIO <span class="add-icon">👤+</span>
        </button>

        <div class="stats-grid">
            <div class="stat-card border-cyan">
                <p>TOTAL MIEMBROS</p>
                <h3 id="totalCount">0</h3>
            </div>
            <div class="stat-card border-purple">
                <p>PENDIENTES</p>
                <h3 id="pendingCount">0</h3>
            </div>
        </div>

        <div class="results-section">
            <p class="section-title">RESULTADOS RECIENTES</p>

            <div id="usersContainer" class="users-list">
                </div>
        </div>

    </main>

    <nav id="navMenu" class="bottom-nav" style="display: none;">
        <div class="nav-item">
            <span class="icon">🎛️</span>
            <p>Overview</p>
        </div>
        <div class="nav-item active">
            <span class="icon">🛡️</span>
            <p>Whitelist</p>
        </div>
        <div class="nav-item">
            <span class="icon">👥</span>
            <p>Members</p>
        </div>
        <div class="nav-item">
            <span class="icon">🕒</span>
            <p>Logs</p>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
